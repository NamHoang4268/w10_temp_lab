# ArgoCD App: Deploy Gatekeeper templates + constraints.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: gatekeeper-policies
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "3"
spec:
    project: default
    source:
        repoURL: https://github.com/NamHoang4268/w10_temp_lab.git
        path: gatekeeper
        targetRevision: main
        directory:
            recurse: true
    destination:
        server: https://kubernetes.default.svc
        namespace: gatekeeper-system
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - ServerSideApply=true
            - SkipDryRunOnMissingResource=true
