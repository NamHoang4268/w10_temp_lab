apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: policies
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "1"
spec:
    project: default
    source:
        repoURL: https://github.com/NamHoang4268/w10_temp_lab.git
        path: policies
        targetRevision: main
    destination:
        server: https://kubernetes.default.svc
        namespace: cosign-system
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - ServerSideApply=true
            - SkipDryRunOnMissingResource=true
