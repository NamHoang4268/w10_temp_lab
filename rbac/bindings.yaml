apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: alice-demo-developer
    namespace: demo
subjects:
    - kind: User
      name: alice
      apiGroup: rbac.authorization.k8s.io
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: demo-developer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: bob-cluster-pod-reader
subjects:
    - kind: User
      name: bob
      apiGroup: rbac.authorization.k8s.io
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: cluster-pod-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: carol-cluster-viewer
subjects:
    - kind: User
      name: carol
      apiGroup: rbac.authorization.k8s.io
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: cluster-viewer
