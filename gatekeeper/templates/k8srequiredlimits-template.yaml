apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
    name: k8srequiredlimits
    annotations:
        argocd.argoproj.io/sync-wave: "0"
spec:
    crd:
        spec:
            names:
                kind: K8sRequiredLimits
    targets:
        - target: admission.k8s.gatekeeper.sh
          rego: |
              package k8srequiredlimits

              violation[{"msg": msg}] {
                container := input_containers[_]
                limits := object.get(object.get(container, "resources", {}), "limits", {})
                count(limits) == 0
                msg := sprintf("container %q must define resources.limits", [container.name])
              }

              input_containers[c] {
                spec := pod_spec
                c := spec.containers[_]
              }

              input_containers[c] {
                spec := pod_spec
                c := spec.initContainers[_]
              }

              pod_spec := input.review.object.spec {
                input.review.kind.kind == "Pod"
              }

              pod_spec := input.review.object.spec.template.spec {
                template_kinds[input.review.kind.kind]
              }

              pod_spec := input.review.object.spec.jobTemplate.spec.template.spec {
                input.review.kind.kind == "CronJob"
              }

              template_kinds := {
                "DaemonSet",
                "Deployment",
                "Job",
                "ReplicaSet",
                "Rollout",
                "StatefulSet",
              }
