apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
    name: k8sallowedrepos
    annotations:
        argocd.argoproj.io/sync-wave: "0"
spec:
    crd:
        spec:
            names:
                kind: K8sAllowedRepos
            validation:
                openAPIV3Schema:
                    type: object
                    properties:
                        repos:
                            type: array
                            items:
                                type: string
    targets:
        - target: admission.k8s.gatekeeper.sh
          rego: |
              package k8sallowedrepos

              violation[{"msg": msg}] {
                container := input_containers[_]
                not image_matches_repo(container.image)
                msg := sprintf("container %q uses disallowed image %q", [container.name, container.image])
              }

              image_matches_repo(image) {
                repo := input.parameters.repos[_]
                startswith(lower(image), lower(repo))
              }

              input_containers[c] {
                spec := pod_spec
                c := spec.containers[_]
              }

              input_containers[c] {
                spec := pod_spec
                c := spec.initContainers[_]
              }

              pod_spec := input.review.object.spec {
                input.review.kind.kind == "Pod"
              }

              pod_spec := input.review.object.spec.template.spec {
                template_kinds[input.review.kind.kind]
              }

              pod_spec := input.review.object.spec.jobTemplate.spec.template.spec {
                input.review.kind.kind == "CronJob"
              }

              template_kinds := {
                "DaemonSet",
                "Deployment",
                "Job",
                "ReplicaSet",
                "Rollout",
                "StatefulSet",
              }
