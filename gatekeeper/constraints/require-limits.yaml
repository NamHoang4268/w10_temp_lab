apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sContainerLimits
metadata:
    name: require-resource-limits
    annotations:
        argocd.argoproj.io/sync-wave: "1"
spec:
    enforcementAction: deny
    match:
        excludedNamespaces:
            - argocd
            - argo-rollouts
            - external-secrets
            - gatekeeper-system
            - kube-system
            - monitoring
        kinds:
            - apiGroups: [""]
              kinds: ["Pod"]
    parameters:
        cpu: "4000m"
        memory: "8Gi"
