apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sDisallowedTags
metadata:
    name: disallow-latest-tag
    annotations:
        argocd.argoproj.io/sync-wave: "1"
spec:
    enforcementAction: deny
    match:
        excludedNamespaces:
            - argocd
            - argo-rollouts
            - external-secrets
            - gatekeeper-system
            - kube-system
            - monitoring
        kinds:
            - apiGroups: [""]
              kinds: ["Pod"]
    parameters:
        tags:
            - latest
