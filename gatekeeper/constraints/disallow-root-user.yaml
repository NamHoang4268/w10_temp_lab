apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPAllowedUsers
metadata:
    name: disallow-root-user
    annotations:
        argocd.argoproj.io/sync-wave: "1"
spec:
    enforcementAction: deny
    match:
        excludedNamespaces:
            - argocd
            - argo-rollouts
            - external-secrets
            - gatekeeper-system
            - kube-system
            - monitoring
        kinds:
            - apiGroups: [""]
              kinds: ["Pod"]
    parameters:
        runAsUser:
            rule: MustRunAsNonRoot
        runAsGroup:
            rule: RunAsAny
        supplementalGroups:
            rule: RunAsAny
        fsGroup:
            rule: RunAsAny
