apiVersion: apps/v1
kind: Deployment
metadata:
    name: deny-latest
    namespace: demo
spec:
    replicas: 1
    selector:
        matchLabels:
            app: deny-latest
    template:
        metadata:
            labels:
                app: deny-latest
        spec:
            containers:
                - name: app
                  image: ghcr.io/namhoang4268/w10-api:latest
                  ports:
                      - containerPort: 8080
                  resources:
                      limits:
                          cpu: 100m
                          memory: 128Mi
