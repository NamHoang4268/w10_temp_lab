apiVersion: v1
kind: Pod
metadata:
    name: deny-host-network
    namespace: demo
spec:
    hostNetwork: true
    containers:
        - name: app
          image: ghcr.io/namhoang4268/w10-api:0.0.2
          ports:
              - containerPort: 8080
          resources:
              limits:
                  cpu: 100m
                  memory: 128Mi
