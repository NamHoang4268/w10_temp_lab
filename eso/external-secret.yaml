apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: db-creds
    namespace: demo
    annotations:
        argocd.argoproj.io/sync-wave: "1"
spec:
    refreshPolicy: Periodic
    refreshInterval: 30s
    secretStoreRef:
        name: aws-store
        kind: SecretStore
    target:
        name: db-secret
        creationPolicy: Owner
        deletionPolicy: Retain
    data:
        - secretKey: password
          remoteRef:
              key: demo/db/password
              conversionStrategy: Default
              decodingStrategy: None
              metadataPolicy: None
