# Build and push Docker image to GitHub Container Registry
name: Build, Scan and Push Image

on:
    push:
        branches:
            - main
        paths:
            - "src/api/**"
            - ".github/workflows/build-push.yml"
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: namhoang4268/w10-api
    SCAN_IMAGE: local/w10-api:scan

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Calculate semantic version
              id: semver
              uses: paulhatch/semantic-version@v5.4.0
              with:
                  tag_prefix: "v"
                  major_pattern: "(BREAKING CHANGE:|!:)"
                  minor_pattern: "^feat"
                  version_format: "${major}.${minor}.${patch}"
                  bump_each_commit: false

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=raw,value=${{ steps.semver.outputs.version }}
                      type=sha,prefix=v${{ steps.semver.outputs.version }}-

            - name: Build local image for Trivy scan
              uses: docker/build-push-action@v6
              with:
                  context: ./src/api
                  load: true
                  tags: ${{ env.SCAN_IMAGE }}

            - name: Install Trivy
              run: |
                  curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                    | sh -s -- -b /usr/local/bin
                  trivy --version

            - name: Run Trivy vulnerability scanner
              run: |
                  trivy image \
                    --exit-code 1 \
                    --severity HIGH,CRITICAL \
                    --ignore-unfixed \
                    --pkg-types os,library \
                    --no-progress \
                    "${{ env.SCAN_IMAGE }}"

            - name: Build and push Docker image
              id: build_push
              uses: docker/build-push-action@v6
              with:
                  context: ./src/api
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

            - name: Install Cosign
              uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

            - name: Sign image digest with Cosign
              shell: pwsh
              env:
                  COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
                  COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
              run: |
                  $keyFile = Join-Path $env:RUNNER_TEMP "cosign.key"
                  Set-Content -Path $keyFile -Value $env:COSIGN_PRIVATE_KEY -NoNewline
                  try {
                    cosign sign --yes --key $keyFile "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}"
                  } finally {
                    Remove-Item $keyFile -Force -ErrorAction SilentlyContinue
                  }

            - name: Update rollout.yaml with new version
              run: |
                  sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
                  sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml

            - name: Commit and push version update
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add app-api/rollout.yaml
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
                    git push
                  fi

            - name: Create git tag
              run: |
                  git tag v${{ steps.semver.outputs.version }}
                  git push origin v${{ steps.semver.outputs.version }}
